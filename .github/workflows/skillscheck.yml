name: Skills Check

permissions:
  contents: read

concurrency:
  group: skillscheck-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  skillscheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - run: uvx skillscheck@0.9.2 --strict skills
